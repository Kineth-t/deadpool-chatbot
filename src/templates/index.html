<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deadpool Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
        }

        .header {
            padding: 15px;
            background: #d62828;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 15px;
            line-height: 1.4;
        }

        .user {
            align-self: flex-end;
            background: #d62828;
            color: white;
        }

        .bot {
            align-self: flex-start;
            background: #333;
            color: #eee;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: #1e1e1e;
            border-top: 1px solid #333;
        }

        .input-area textarea {
            flex: 1;
            resize: none;
            padding: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        .input-area button {
            margin-left: 10px;
            padding: 10px 15px;
            background: #d62828;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .input-area button:hover {
            background: #e63946;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">💬 Deadpool Chatbot</div>

        <div class="chat-box" id="chat-box">
            {% if history %}
                {% for msg in history %}
                    <div class="message {{ msg.role }}">
                        {{ msg.content }}
                    </div>
                {% endfor %}
            {% endif %}
        </div>

        <form class="input-area" id="chat-form">
            <textarea id="input" name="input" rows="2" placeholder="Type a message..."></textarea>
            <button type="submit">Send</button>
        </form>
    </div>

    <script>
        const form = document.getElementById("chat-form");
        const input = document.getElementById("input");
        const chatBox = document.getElementById("chat-box");

        function addMessage(text, role) {
            const div = document.createElement("div");
            div.className = "message " + role;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const text = input.value.trim();
            if (!text) return;

            addMessage(text, "user");
            input.value = "";

            const res = await fetch("/generate", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ input: text })
            });

            const data = await res.json();
            addMessage(data.response, "bot");
        });

        // Auto-scroll on load
        chatBox.scrollTop = chatBox.scrollHeight;
    </script>
</body>
</html>
